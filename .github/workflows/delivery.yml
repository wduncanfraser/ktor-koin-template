---
name: Delivery

on:
  push:
    branches:
    - main
  pull_request:

env:
  SERVICE_TAG: ktor-koin-template:latest

jobs:
  yaml-lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v6
    - name: Run yamllint
      uses: reviewdog/action-yamllint@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review
        fail_level: warning
        filter_mode: file
        level: warning

  github-actions-lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v6
    - name: Run actionlint
      uses: reviewdog/action-actionlint@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review
        fail_level: warning
        level: warning

  api-lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Lint API contracts
      run: docker run --rm -v "$PWD":/spec redocly/cli lint --format=github-actions

  kotlin-lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Run detekt
      run: ./gradlew detekt

  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Run tests and generate coverage report
      run: ./gradlew test integrationTest koverXmlReport koverHtmlReport

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: build/reports/kover/report.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results to Codecov
      uses: codecov/test-results-action@v1
      with:
        files: build/test-results/**/*.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload coverage report artifact
      uses: actions/upload-artifact@v7
      with:
        name: kover-coverage-report
        path: build/reports/kover/
        retention-days: 30

  dependency-submission:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v5

  docker-build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write   # upload SARIF to GitHub Security tab
      actions: read            # required by upload-sarif on private repos

    steps:
    - uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        load: true             # export to local daemon so Trivy can scan it
        tags: ${{ env.SERVICE_TAG }}

    - name: Scan image
      id: trivy
      uses: aquasecurity/trivy-action@0.35.0
      continue-on-error: true
      with:
        image-ref: ${{ env.SERVICE_TAG }}
        format: sarif
        output: trivy-results.sarif
        severity: HIGH,CRITICAL

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: trivy-results.sarif

  api-codegen:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Bundle API contracts
      run: ./contracts/build.sh

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Generate API
      run: ./gradlew generateApi

    - name: Check for uncommitted changes
      run: git diff --exit-code

  db-codegen:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: admin
        ports:
        - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v6

    # db/dev/init-db.sh cannot be mounted via the service container's volumes: field because
    # service containers start before actions/checkout runs, so the workspace file doesn't
    # exist yet and Docker creates a directory at the mount path instead of a file.
    - name: Create todo role and database
      run: |
        psql -h localhost -U postgres -c "CREATE USER todo WITH PASSWORD 'todo';"
        psql -h localhost -U postgres -c "CREATE DATABASE todo WITH OWNER todo;"
      env:
        PGPASSWORD: admin

    - name: Run database migrations
      run: |
        docker run --rm --network host \
          -v "$PWD/db":/db \
          -e DATABASE_URL="postgres://postgres:admin@localhost:5432/todo?sslmode=disable" \
          ghcr.io/amacneil/dbmate up

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Generate jOOQ classes
      run: ./gradlew jooqCodegen

    - name: Check for uncommitted changes
      # -I ignores hunks where all changed lines match the pattern.
      # db/schema.sql contains pg_dump/database version comments that vary by environment.
      run: git diff --exit-code -I '-- Dumped (from database|by pg_dump) version'

  required-pr-checks:
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    needs:
    - yaml-lint
    - github-actions-lint
    - api-lint
    - kotlin-lint
    - test
    - dependency-submission
    - docker-build
    - api-codegen
    - db-codegen
    permissions: {}

    steps:
    - name: Verify all checks passed or were skipped
      env:
        RESULTS: ${{ join(needs.*.result, ',') }}
      run: |
        if echo "$RESULTS" | grep -qE '(failure|cancelled)'; then
          echo "One or more required checks failed or were cancelled"
          exit 1
        fi
        echo "All required checks passed or were skipped"
