---
name: Delivery

on:
  push:
    branches:
    - main
  pull_request:

env:
  SERVICE_TAG: ktor-koin-template:latest

jobs:
  yaml-lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v6
    - name: Run yamllint
      uses: reviewdog/action-yamllint@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review
        fail_level: warning
        filter_mode: file
        level: warning

  github-actions-lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v6
    - name: Run actionlint
      uses: reviewdog/action-actionlint@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review
        fail_level: warning
        level: warning

  api-lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Lint API contracts
      run: docker run --rm -v "$PWD":/spec redocly/cli lint --format=github-actions

  kotlin-lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Run detekt
      run: ./gradlew detekt

  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Run tests and generate coverage report
      run: ./gradlew test integrationTest koverXmlReport koverHtmlReport

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: build/reports/kover/report.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results to Codecov
      uses: codecov/test-results-action@v1
      with:
        files: build/test-results/**/*.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload coverage report artifact
      uses: actions/upload-artifact@v7
      with:
        name: kover-coverage-report
        path: build/reports/kover/
        retention-days: 30

  dependency-submission:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v5

  docker-build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        tags: ${{ env.SERVICE_TAG }}

  api-codegen:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Bundle API contracts
      run: ./contracts/build.sh

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Generate API
      run: ./gradlew generateApi

    - name: Check for uncommitted changes
      run: git diff --exit-code

  db-codegen:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: todo
        ports:
        - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v6

    - name: Run database migrations
      run: |
        docker run --rm --network host \
          -v "$PWD/db":/db \
          -e DATABASE_URL="postgres://postgres:admin@localhost:5432/todo?sslmode=disable" \
          ghcr.io/amacneil/dbmate up

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Generate jOOQ classes
      run: ./gradlew jooqCodegen

    - name: Check for uncommitted changes
      run: git diff --exit-code

  required-pr-checks:
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    needs:
    - yaml-lint
    - github-actions-lint
    - api-lint
    - kotlin-lint
    - test
    - dependency-submission
    - docker-build
    - api-codegen
    - db-codegen
    permissions: {}

    steps:
    - name: Verify all checks passed or were skipped
      env:
        RESULTS: ${{ join(needs.*.result, ',') }}
      run: |
        if echo "$RESULTS" | grep -qE '(failure|cancelled)'; then
          echo "One or more required checks failed or were cancelled"
          exit 1
        fi
        echo "All required checks passed or were skipped"
