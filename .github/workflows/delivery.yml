---
name: Delivery

on:
  push:
    branches:
    - main
  pull_request:

env:
  SERVICE_TAG: ktor-koin-template:latest

jobs:
  lint-yaml:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Run yamllint
      uses: reviewdog/action-yamllint@b5f7217d8c815ae374d1d55840d5e569d82f01f0 # v1.22.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review
        fail_level: warning
        filter_mode: file
        level: warning

  lint-github-actions:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Run actionlint
      uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        reporter: github-pr-review
        fail_level: warning
        level: warning

  lint-api:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Lint API contracts
      run: docker run --rm -v "$PWD":/spec redocly/cli lint --format=github-actions

  lint-kotlin:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup JDK
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

    - name: Run detekt
      run: ./gradlew detekt

  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup JDK
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

    - name: Run tests and generate coverage report
      run: ./gradlew test integrationTest koverXmlReport koverHtmlReport

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: build/reports/kover/report.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: build/test-results/**/*.xml
        report_type: test_results
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload coverage report artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: kover-coverage-report
        path: build/reports/kover/
        retention-days: 30

  api-codegen:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Bundle API contracts
        run: ./contracts/build.sh

      - name: Setup JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Generate API
        run: ./gradlew generateApi

      - name: Check for uncommitted changes
        run: git diff --exit-code

  db-codegen:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # db/dev/init-db.sh cannot be mounted via the service container's volumes: field because
      # service containers start before actions/checkout runs, so the workspace file doesn't
      # exist yet and Docker creates a directory at the mount path instead of a file.
      - name: Create todo role and database
        run: |
          psql -h localhost -U postgres -c "CREATE USER todo WITH PASSWORD 'todo';"
          psql -h localhost -U postgres -c "CREATE DATABASE todo WITH OWNER todo;"
        env:
          PGPASSWORD: admin

      - name: Run database migrations
        run: |
          docker run --rm --network host \
            -v "$PWD/db":/db \
            -e DATABASE_URL="postgres://postgres:admin@localhost:5432/todo?sslmode=disable" \
            ghcr.io/amacneil/dbmate up

      - name: Setup JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Generate jOOQ classes
        run: ./gradlew jooqCodegen

      - name: Check for uncommitted changes
        # -I ignores hunks where all changed lines match the pattern.
        # db/schema.sql contains pg_dump/database version comments that vary by environment.
        run: git diff --exit-code -I '-- Dumped (from database|by pg_dump) version'

  dependency-submission:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup JDK
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: 'temurin'
        java-version: 25

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

  docker-build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write   # upload SARIF to GitHub Security tab
      actions: read            # required by upload-sarif on private repos

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        push: false
        load: true             # export to local daemon so Trivy can scan it
        tags: ${{ env.SERVICE_TAG }}

    - name: Scan image
      id: trivy
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      continue-on-error: true
      with:
        image-ref: ${{ env.SERVICE_TAG }}
        format: sarif
        output: trivy-results.sarif
        severity: HIGH,CRITICAL

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
      if: always()
      with:
        sarif_file: trivy-results.sarif

  required-pr-checks:
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    needs:
    - lint-yaml
    - lint-github-actions
    - lint-api
    - lint-kotlin
    - test
    - api-codegen
    - db-codegen
    - dependency-submission
    - docker-build
    permissions: {}

    steps:
    - name: Verify all checks passed or were skipped
      env:
        RESULTS: ${{ join(needs.*.result, ',') }}
      run: |
        if echo "$RESULTS" | grep -qE '(failure|cancelled)'; then
          echo "One or more required checks failed or were cancelled"
          exit 1
        fi
        echo "All required checks passed or were skipped"
