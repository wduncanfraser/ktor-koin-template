---
services:
  app:
    build: .
    restart: unless-stopped
    cpus: 2
    mem_limit: 512m
    env_file:
    - .env
    environment:
      DATABASE_URL: r2dbc:postgresql://db:5432/todo
      DATABASE_POOLSIZE: 10
      REDIS_HOST: valkey
      OPENFGA_APIURL: http://openfga:8080
      AUTHENTICATION_OAUTH_POSTLOGINREDIRECTURL: http://localhost:80/
      # Tracing is instrumented but export is off by default (see config/Tracing.kt). To send traces
      # to an OTLP backend, set OTEL_TRACES_EXPORTER=otlp and OTEL_EXPORTER_OTLP_ENDPOINT here.
    ports:
    - "8080:8080"
    networks:
    - ktor-koin-template
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      dbmate:
        condition: service_completed_successfully
      fga-provision:
        condition: service_completed_successfully

  # One-shot: create/upgrade OpenFGA's schema in the openfga database. Idempotent, safe every up.
  openfga-migrate:
    image: openfga/openfga:latest
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://openfga:openfga@db:5432/openfga?sslmode=disable
    networks:
    - ktor-koin-template
    depends_on:
      db:
        condition: service_healthy

  openfga:
    image: openfga/openfga:latest
    command: run
    restart: unless-stopped
    # Persist to the shared Postgres instance (openfga database) so stores/models/tuples survive
    # `docker compose down`/`up`. The openfga database is created by db/dev/init-db.sh.
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://openfga:openfga@db:5432/openfga?sslmode=disable
    ports:
    - "8081:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=:8081"]
      interval: 1s
      timeout: 5s
      retries: 10
    networks:
    - ktor-koin-template
    depends_on:
      db:
        condition: service_healthy
      openfga-migrate:
        condition: service_completed_successfully

  # Idempotent: creates the "todo" store + model only if it doesn't already exist (see fga/provision).
  fga-provision:
    build: ./fga/provision
    volumes:
    - ./fga:/model
    networks:
    - ktor-koin-template
    depends_on:
      openfga:
        condition: service_healthy

  dbmate:
    image: ghcr.io/amacneil/dbmate:2.30
    command: --wait --wait-timeout 10s migrate --strict --verbose
    environment:
      DATABASE_URL: postgresql://db:5432/todo?sslmode=disable
      PGUSER: postgres
      PGPASSWORD: admin
    volumes:
    - ./db:/db
    networks:
    - ktor-koin-template
    depends_on:
    - db

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
    ports:
    - "5432:5432"
    networks:
    - ktor-koin-template
    volumes:
    - ./db/dev/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    - db_data:/var/lib/postgresql

  valkey:
    image: valkey/valkey:8.1-alpine
    restart: unless-stopped
    environment:
      VALKEY_EXTRA_FLAGS: --requirepass valkey
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a valkey ping | grep PONG"]
      interval: 1s
    ports:
    - "6379:6379"
    networks:
    - ktor-koin-template
    volumes:
    - valkey_data:/data

volumes:
  db_data:
  valkey_data:

networks:
  ktor-koin-template:
    name: ktor-koin-template
