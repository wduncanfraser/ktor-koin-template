---
queue_rules:
- name: default
  merge_method: squash
  # Serial queue (one PR tested against latest main at a time). Batching is left
  # off because combining two Dependabot PRs produces a merged gradle.lockfile
  # that isn't regenerated on Mergify's speculative branch and would fail CI.
  batch_size: 1
  # queue_conditions gate automatic entry into the queue: only Dependabot PRs
  # auto-queue once CI is green. Other PRs must be queued manually (via the
  # `@Mergifyio queue` command or the Mergify dashboard).
  queue_conditions:
  - author=dependabot[bot]
  - check-success=required-pr-checks
  - check-success=codecov/patch
  # merge_conditions are re-checked on the speculative branch before merging.
  merge_conditions:
  - check-success=required-pr-checks
  - check-success=codecov/patch
