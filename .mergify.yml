---
queue_rules:
- name: default
  merge_method: squash
  # Serial queue (one PR tested against latest main at a time). Batching is left
  # off because combining two Dependabot PRs produces a merged gradle.lockfile
  # that isn't regenerated on Mergify's speculative branch and would fail CI.
  batch_size: 1
  merge_conditions:
  - check-success=required-pr-checks
  - check-success=codecov/patch

pull_request_rules:
- name: Queue Dependabot PRs once CI is green
  conditions:
  - author=dependabot[bot]
  - check-success=required-pr-checks
  - check-success=codecov/patch
  actions:
    queue:
      name: default

- name: Queue approved PRs once CI is green
  conditions:
  - author!=dependabot[bot]
  - "#approved-reviews-by>=1"
  - check-success=required-pr-checks
  - check-success=codecov/patch
  actions:
    queue:
      name: default
