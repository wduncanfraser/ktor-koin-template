---
get:
  summary: List all todo lists
  operationId: listTodoLists
  tags:
  - TodoLists
  parameters:
  - $ref: ../components/parameters/PageSize.yaml
  - $ref: ../components/parameters/PageNumber.yaml
  responses:
    '200':
      $ref: ../components/responses/todo-lists/ListTodoListsResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    default:
      $ref: ../components/responses/UnexpectedError.yaml
post:
  summary: Create a todo list
  operationId: createTodoList
  tags:
  - TodoLists
  requestBody:
    required: true
    description: The request body for creating a Todo list.
    content:
      application/json:
        schema:
          $ref: ../components/schemas/todo-lists/CreateTodoListRequest.yaml
  responses:
    '201':
      description: Todo list was created successfully.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/todo-lists/TodoListResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    default:
      $ref: ../components/responses/UnexpectedError.yaml
