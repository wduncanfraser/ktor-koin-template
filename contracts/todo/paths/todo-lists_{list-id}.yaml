---
get:
  summary: Get a todo list
  operationId: getTodoList
  tags:
  - TodoLists
  parameters:
  - $ref: ../components/parameters/todo-lists/TodoListId.yaml
  responses:
    '200':
      description: Todo list was retrieved successfully.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/todo-lists/TodoListResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    default:
      $ref: ../components/responses/UnexpectedError.yaml
put:
  summary: Update a todo list
  operationId: updateTodoList
  tags:
  - TodoLists
  parameters:
  - $ref: ../components/parameters/todo-lists/TodoListId.yaml
  requestBody:
    required: true
    description: The request body for updating a Todo list.
    content:
      application/json:
        schema:
          $ref: ../components/schemas/todo-lists/UpdateTodoListRequest.yaml
  responses:
    '200':
      description: Todo list was updated successfully.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/todo-lists/TodoListResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    '422':
      $ref: ../components/responses/UnprocessableEntity.yaml
    default:
      $ref: ../components/responses/UnexpectedError.yaml
delete:
  summary: Delete a todo list
  operationId: deleteTodoList
  tags:
  - TodoLists
  parameters:
  - $ref: ../components/parameters/todo-lists/TodoListId.yaml
  responses:
    '204':
      description: Todo list was deleted successfully.
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
    default:
      $ref: ../components/responses/UnexpectedError.yaml
